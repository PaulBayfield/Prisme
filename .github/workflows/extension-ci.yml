name: extension-ci

on:
  push:
    branches:
      - main
    paths:
      - "src/extension/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "src/extension/**"
      - ".github/workflows/extension-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/extension
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/extension/package-lock.json

      - run: npm ci
      - run: npm test
