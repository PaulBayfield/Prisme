name: worker-ci

on:
  push:
    branches:
      - main
    paths:
      - "src/worker/**"
      - ".github/workflows/worker-ci.yml"
  pull_request:
    paths:
      - "src/worker/**"
      - ".github/workflows/worker-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/worker
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # Pull requests build the image to catch a broken Dockerfile, but only
      # a push to main (merge) logs in and publishes it.
      - if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: src/worker
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/paulbayfield/prisme-worker:latest
            ghcr.io/paulbayfield/prisme-worker:${{ github.sha }}
