name: frontend-ci

on:
  push:
    branches:
      - main
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - run: npm ci
      - run: npm run lint

      # Dummy values so `next build` (which imports lib/auth.ts at the module
      # level) doesn't need a real Authentik/Postgres deployment - DEMO_MODE
      # also skips constructing the Authentik provider entirely.
      - run: npm run build
        env:
          DEMO_MODE: "true"
          NEXTAUTH_SECRET: ci-build-placeholder
          NEXTAUTH_URL: http://localhost:3000
          CREDENTIALS_ENCRYPTION_KEY: ci-build-placeholder
          POSTGRES_DATABASE: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # Pull requests build the image to catch a broken Dockerfile, but only
      # a push to main (merge) logs in and publishes it.
      - if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: src/frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/paulbayfield/prisme-frontend:latest
            ghcr.io/paulbayfield/prisme-frontend:${{ github.sha }}
